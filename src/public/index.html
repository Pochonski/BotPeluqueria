<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Premium | Reserva Online</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <h1 class="logo">BARBER<span>PRO</span></h1>
            <p class="subtitle">Agenda tu estilo con un par de clics</p>
        </header>

        <main id="app">
            <section class="card animate-fade-in">
                <h2>Elige tu servicio</h2>
                <div id="services-list" class="services-grid">
                    <!-- Los servicios se cargarán dinámicamente -->
                    <div class="skeleton-loader"></div>
                    <div class="skeleton-loader"></div>
                </div>
            </section>

            <section id="calendar-section" class="card hidden animate-fade-in">
                <h2>Selecciona Fecha y Hora</h2>
                <div class="calendar-container">
                    <!-- Aquí irá el selector de fecha -->
                    <input type="date" id="date-picker" class="custom-input">
                    <div id="hours-grid" class="hours-grid">
                        <!-- Horas disponibles -->
                    </div>
                </div>
            </section>

            <section id="confirm-section" class="card hidden animate-fade-in">
                <h2>Confirma tu cita</h2>
                <form id="booking-form">
                    <div class="form-group">
                        <label for="client-name">Tu Nombre</label>
                        <input type="text" id="client-name" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="client-phone">WhatsApp</label>
                        <input type="tel" id="client-phone" placeholder="Ej. 8888 8888" required>
                    </div>
                    <button type="submit" class="btn-primary">Reservar Ahora</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 BarberPro Costa Rica. Todos los derechos reservados.</p>
        </footer>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
